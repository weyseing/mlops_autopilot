services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET}
      "
    env_file: .env

  mlflow:
    build: .
    command: mlflow
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    command: serve
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      mlflow:
        condition: service_healthy

  # One-off service for retraining (uses real AWS credentials)
  # Run with: docker compose run --rm retrain
  retrain:
    build: .
    command: retrain
    env_file: .env
    volumes:
      - ./src:/app/src
      - ~/.aws:/home/appuser/.aws:ro
    depends_on:
      mlflow:
        condition: service_healthy
    profiles:
      - retrain

volumes:
  postgres_data:
  minio_data:
